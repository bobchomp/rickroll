<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Player</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    video {
      width: 720px;
      max-width: 90vw;
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
    }

    p {
      color: #ffffff;
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <video controls>
      <source src="https://image2url.com/r2/default/videos/1774344640171-c543d982-b3e6-45c5-b262-3f2c3ea10f14.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <p>Press play!</p>
  </div>
</body>
</html>
